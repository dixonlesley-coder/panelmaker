name: Release

# Builds the gated PanelMaker desktop installers for macOS, Windows and Linux,
# and — on a version tag (vX.Y.Z) — publishes them to a GitHub Release, which is
# the auto-update feed electron-updater reads.
#
# The Google Workspace licensing credentials are injected at BUILD time from
# repository secrets and baked into the packaged main bundle (via the Vite
# `define` in electron.vite.config.ts). They never live in the repo or in source.
#
# One-time setup — add these under Settings → Secrets and variables → Actions:
#   GOOGLE_CLIENT_ID       your Desktop-app OAuth client id
#   GOOGLE_CLIENT_SECRET   the OAuth client secret (low-sensitivity; ships in the app)
#   ALLOWED_HD             your Workspace domain, e.g. company.example
# GITHUB_TOKEN is provided automatically — no need to add it.
#
# Cut a release by pushing a tag that matches package.json "version":
#   npm version patch        # bumps version + creates the tag
#   git push --follow-tags
# Or run the workflow manually (workflow_dispatch): with publish=true it
# publishes a GitHub Release at the package.json version (no tag needed);
# without it, it's an unpublished test build (workflow artifacts only).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish a GitHub Release (download + auto-update feed)'
        type: boolean
        default: false

permissions:
  contents: write # electron-builder uploads the installers to a GitHub Release

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        # Internal deployment is Windows-only. Add macos-latest / ubuntu-latest
        # back here if you ever distribute to those platforms (sign macOS first).
        os: [windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Full install (Electron binary + native better-sqlite3) — needed to package.
      - name: Install dependencies
        run: npm ci

      # Belt-and-braces: the engine + UI gates must pass before we ship.
      - name: Typecheck & test
        run: |
          npx tsc --noEmit -p tsconfig.json
          npx vitest run

      - name: Build, sign & package (gated installer)
        env:
          # --- Google Workspace licensing — baked into the main bundle ---
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          ALLOWED_HD: ${{ secrets.ALLOWED_HD }}
          # --- GitHub Releases publish (auto-update feed) ---
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # True when a manual run asked to publish (tag pushes always publish).
          PUBLISH_INPUT: ${{ inputs.publish }}
          # --- Code signing (per-OS). Each *_CSC_LINK is a BASE64-encoded cert.
          #     Passed under NEUTRAL names (SIGN_*) so an empty value is never seen
          #     by electron-builder as a (broken) cert path — the script exports the
          #     real CSC_LINK only when a cert exists. Add these to enable signing:
          #       Windows (Authenticode .pfx): WINDOWS_CSC_LINK / WINDOWS_CSC_KEY_PASSWORD
          #       macOS  (Developer ID .p12):  MAC_CSC_LINK / MAC_CSC_KEY_PASSWORD
          #     (EV / HSM-backed Windows certs can't be a .pfx file — those need a
          #     cloud-signing integration, e.g. Azure Trusted Signing; not wired here.)
          SIGN_CSC_LINK: ${{ (matrix.os == 'macos-latest' && secrets.MAC_CSC_LINK) || (matrix.os == 'windows-latest' && secrets.WINDOWS_CSC_LINK) || '' }}
          SIGN_CSC_KEY_PASSWORD: ${{ (matrix.os == 'macos-latest' && secrets.MAC_CSC_KEY_PASSWORD) || (matrix.os == 'windows-latest' && secrets.WINDOWS_CSC_KEY_PASSWORD) || '' }}
          # --- macOS notarization (Apple). Used only on mac when all three are set. ---
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          set -euo pipefail

          # Publish to a GitHub Release on a version tag, or when a manual run
          # asks for it (electron-builder then tags/names the release from
          # package.json "version"); otherwise just build.
          if [[ "${GITHUB_REF}" == refs/tags/v* || "${PUBLISH_INPUT:-}" == "true" ]]; then PUBLISH=always; else PUBLISH=never; fi

          # A PUBLISHED release requires its tag to exist (GitHub 422s otherwise
          # — drafts are the only tagless kind). On a manual publish, create and
          # push the version tag here; pushes made with GITHUB_TOKEN do not
          # re-trigger workflows, so this cannot recurse into the tag trigger.
          if [[ "${PUBLISH}" == "always" && "${GITHUB_REF}" != refs/tags/* ]]; then
            VERSION="$(node -p "require('./package.json').version")"
            if git rev-parse -q --verify "refs/tags/v${VERSION}" >/dev/null; then
              echo "Tag v${VERSION} already exists locally"
            else
              git tag "v${VERSION}"
            fi
            git push origin "v${VERSION}" || echo "Tag v${VERSION} already on remote"
          fi

          # Pre-create the GitHub Release so electron-builder only UPLOADS to it.
          # electron-builder uploads the installer + its .blockmap in parallel, and
          # when the release doesn't exist yet each upload races to create it — on
          # v0.1.10 both logged "creating GitHub release" and only the blockmap
          # stuck, dropping the .exe and latest.yml (the run still went green).
          # Creating the release up-front removes that race.
          if [[ "${PUBLISH}" == "always" ]]; then
            VERSION="${VERSION:-$(node -p "require('./package.json').version")}"
            if gh release view "v${VERSION}" >/dev/null 2>&1; then
              echo "Release v${VERSION} already exists"
            else
              gh release create "v${VERSION}" --title "${VERSION}" --notes "PanelMaker ${VERSION}"
            fi
          fi

          # Code signing is OPTIONAL (internal-use deployment; certs need a paid
          # subscription). Unsigned publishing is allowed — but warn, because the
          # tradeoffs differ by platform:
          #   - Windows (NSIS): unsigned auto-update WORKS; clients see a one-time
          #     SmartScreen "unknown publisher" prompt on first install.
          #   - macOS: unsigned apps need a Gatekeeper right-click→Open, and
          #     electron-updater can't auto-update an unsigned/ad-hoc .app — so an
          #     unsigned macOS release won't self-update. (Sign+notarize for mac.)
          #   - Linux AppImage: no signature gate anyway.
          # Add WINDOWS_CSC_LINK / MAC_CSC_LINK to sign when you do have certs.
          if [[ "${PUBLISH}" == "always" && ( "${RUNNER_OS}" == "Windows" || "${RUNNER_OS}" == "macOS" ) && -z "${SIGN_CSC_LINK}" ]]; then
            echo "::warning::Publishing an UNSIGNED ${RUNNER_OS} release. Windows auto-update works (SmartScreen prompt on first run); an unsigned macOS build won't auto-update. This is fine for internal distribution." >&2
          fi

          # The demo account is opt-in and must never ship in a published release.
          if [[ "${PUBLISH}" == "always" && "${PANELMAKER_ENABLE_DEMO:-}" == "1" ]]; then
            echo "::error::PANELMAKER_ENABLE_DEMO=1 must not be set for a published release (it bakes in the demo-password bypass)." >&2
            exit 1
          fi

          # Export CSC_LINK only when a cert exists; an empty CSC_LINK is mis-read
          # by electron-builder as a (broken) cert file path (fatal on the macOS
          # post-fuse re-sign). With no cert, disable identity auto-discovery so the
          # build is unsigned / ad-hoc (which the fuse re-sign needs on macOS).
          if [[ -n "${SIGN_CSC_LINK}" ]]; then
            export CSC_LINK="${SIGN_CSC_LINK}"
            export CSC_KEY_PASSWORD="${SIGN_CSC_KEY_PASSWORD}"
            echo "Code signing: enabled for ${RUNNER_OS}"
          else
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            echo "Code signing: skipped (no cert configured for ${RUNNER_OS})"
          fi

          # Enable macOS notarization only when all three Apple credentials exist.
          # Use a plain string (not a bash array): macOS runners ship bash 3.2,
          # where expanding an empty "${arr[@]}" errors under `set -u`.
          NOTARIZE_FLAG=""
          if [[ "${RUNNER_OS}" == "macOS" && -n "${APPLE_ID}" && -n "${APPLE_APP_SPECIFIC_PASSWORD}" && -n "${APPLE_TEAM_ID}" ]]; then
            NOTARIZE_FLAG="-c.mac.notarize=true"
            echo "macOS notarization: enabled"
          elif [[ "${RUNNER_OS}" == "macOS" ]]; then
            echo "macOS notarization: skipped (Apple credentials not set)"
          fi

          npx electron-vite build
          # NOTARIZE_FLAG is intentionally unquoted (empty = no extra arg).
          npx electron-builder --publish "${PUBLISH}" ${NOTARIZE_FLAG}

      - name: Upload installers as workflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: panelmaker-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/latest*.yml
          if-no-files-found: ignore
