appId: com.panelmaker.app
productName: PanelMaker
copyright: Copyright © 2026 PanelMaker

# Rebuild native modules (better-sqlite3) against the bundled Electron ABI.
npmRebuild: true

# Electron Fuses + embedded ASAR integrity: lock down the packaged runtime so the
# Google-Workspace licensing gate and app code are much harder to tamper with.
# electron-builder flips these BEFORE code-signing (requires @electron/fuses).
#   - onlyLoadAppFromAsar + enableEmbeddedAsarIntegrityValidation: the app will
#     only run from the signed app.asar, and its contents are hash-validated, so a
#     patched bundle (e.g. with the licence check removed) is rejected.
#   - runAsNode / nodeOptions / nodeCliInspect off: no ELECTRON_RUN_AS_NODE,
#     NODE_OPTIONS or --inspect backdoors into the main process.
electronFuses:
  runAsNode: false
  enableCookieEncryption: true
  enableNodeOptionsEnvironmentVariable: false
  enableNodeCliInspectArguments: false
  enableEmbeddedAsarIntegrityValidation: true
  onlyLoadAppFromAsar: true

# Auto-update feed: GitHub Releases. `electron-builder --publish always` uploads
# the installers + latest.yml; electron-updater reads them to detect new versions.
publish:
  provider: github
  owner: dixonlesley-coder
  repo: panelmaker

directories:
  output: release
  buildResources: build

# electron-vite emits the compiled main/preload/renderer here.
files:
  - out/**/*
  - package.json

# Native module must stay unpacked so its .node binary is loadable from asar.
asarUnpack:
  - "**/node_modules/better-sqlite3/**"

# Ship offline resources (fonts / seed data) alongside the app.
extraResources:
  - from: resources
    to: resources
    filter:
      - "**/*"

win:
  target:
    - nsis
  artifactName: ${productName}-${version}-setup.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

mac:
  category: public.app-category.productivity
  # Required for notarization; ignored on unsigned builds. The release workflow
  # flips notarization on (-c.mac.notarize=true) when the Apple creds are present.
  hardenedRuntime: true
  target:
    - dmg
    - zip

linux:
  category: Utility
  target:
    - AppImage
    - deb
